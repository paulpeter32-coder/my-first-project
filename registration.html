<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
    <h1 align="center">REGISTRATION FORM</h1><p></p>
    <div>Thank you for taking the time to help us improve the platform</div><p></p>

    <form>
        <label>Name
            <input type="text" placeholder="Enter Your Name">
        </label><br>
        <label>Email
            <input type="Email" placeholder="Enter Your Email" required>
        </label><br>
        <label>Age(OPTIONAL)
            <input type="number" maxlength="40" placeholder="Age">
        </label><p></p>

        <label>which option best describe your current role?<p></p>
        <select>
            <option value="current role">select current role</option>
            <option value="student">student</option>
            <option value="fulltimer">fulltimer</option>
            <option value="part-time">part-time</option>
        </select>
        </label><p></p>
        <label>Would you recommend freeCodeCamp to a friend <p></p>
            <input type="radio" name="radio">Definitely
            <input type="radio" name="radio">Maybe
            <input type="radio" name="radio">Not sure
        </label><p></p>
        <label>What are your feature of freeCodeCamp? <P></P>
            <select>
                <option value="select an option">Select an option</option>
                <option value="HTML">HTML</option>
                <option value="CSS">CSS</option>
                <option value="JAVASCRIPT">JAVASCRIPT</option>
            </select>
        </label><P></P>

        <label>What would you like to see improved?(Check all that apply)<p></p>
        <input type="checkbox">Front-end Projects
        <input type="checkbox">Back-end Projects
        <input type="checkbox">Data Visualization
        <input type="checkbox">Challenges
        <input type="checkbox">Open Source Community
        <input type="checkbox">Gitter Help Rooms
        <input type="checkbox">Videos
        <input type="checkbox">City Meetups
        <input type="checkbox">Wiki
        <input type="checkbox">Forum
        <input type="checkbox">Additional Courses
        </label><p></p>

        <label> Any cooments or suggestions?<p></p>
            <textarea name="text" placeholder="Enter Your Comment Here..."></textarea>
        </label><br>
        <button>submit</button>
    </form>
    
</body>
</html>
